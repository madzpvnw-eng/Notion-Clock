<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jam Gagasan</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#FFFFFF;
    color:white;
    font-family:Arial,sans-serif;
}

.clock{
    text-align:center;
}

#time{
    font-size:64px;
    font-weight:bold;
}

#date{
    margin-top:10px;
    color:#703B3B;
}
</style>

</head>
<body>

<div class="clock">
    <div id="time"></div>
    <div id="date"></div>
</div>

<script>
function updateClock(){
    const now = new Date();

    document.getElementById("time").textContent =
        now.toLocaleTimeString("id-ID");

    document.getElementById("date").textContent =
        now.toLocaleDateString("id-ID",{
            weekday:"long",
            day:"numeric",
            month:"long",
            year:"numeric"
        });
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
